<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="1280" height="620" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="g1" cx="84%" cy="-4%" r="62%">
      <stop offset="0%" stop-color="#ff3b2f" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#ff3b2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="-4%" cy="104%" r="60%">
      <stop offset="0%" stop-color="#8b7bff" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#8b7bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <clipPath id="card"><rect x="1" y="1" width="1278" height="618" rx="6"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1280" height="620" fill="#0b0a0c"/>
    <rect width="1280" height="620" fill="url(#g1)"/>
    <rect width="1280" height="620" fill="url(#g2)"/>
    <rect width="1280" height="620" filter="url(#grain)" opacity="0.05"/>

    <!-- top bar -->
    <g transform="translate(56,42)">
      <rect x="0" y="-2" width="30" height="30" rx="3" fill="none" stroke="#f3ecde" stroke-width="2"/>
      <path d="M15 3c4 4.7 5.3 7.5 5.3 10.3a5.3 5.3 0 1 1-10.6 0c0-2.8 1.3-5.6 5.3-10.3z" fill="#ff3b2f"/>
      <text x="44" y="20" font-size="26" font-weight="700" fill="#f3ecde">Ink<tspan font-style="italic" fill="#ff3b2f">Fuse</tspan></text>
    </g>
    <g transform="translate(1064,40)" font-family="'Courier New', monospace">
      <rect x="0" y="0" width="160" height="34" rx="17" fill="none" stroke="#3a3447"/>
      <circle cx="20" cy="17" r="4" fill="#ff3b2f"/>
      <text x="34" y="22" font-size="13" fill="#c3bbac">0x87d…e50d</text>
    </g>

    <!-- hero -->
    <g transform="translate(56,150)">
      <line x1="0" y1="6" x2="40" y2="6" stroke="#ff3b2f" stroke-width="2"/>
      <text x="54" y="11" font-size="15" font-style="italic" fill="#c3bbac">An on-chain ink house · ARC Testnet</text>

      <text x="-3" y="112" font-size="84" font-weight="700" fill="#f3ecde">Ink that keeps</text>
      <text x="-3" y="196" font-size="84" font-weight="700"><tspan font-style="italic" fill="#ff3b2f">paying</tspan><tspan dx="26" fill="#f3ecde">its artist.</tspan></text>

      <text x="0" y="250" font-size="18" fill="#c3bbac">Drop a sketch · collect in USDC · resell with royalties · tip the artist.</text>

      <g transform="translate(0,286)">
        <rect x="0" y="0" width="262" height="52" rx="26" fill="#ff3b2f"/>
        <text x="131" y="32" font-size="13" font-weight="700" letter-spacing="2.4" fill="#120606" text-anchor="middle" font-family="Arial, sans-serif">EXPLORE THE GALLERY</text>
      </g>
    </g>

    <!-- gallery wall (framed sketches) -->
    <g transform="translate(870,168)">
      <g transform="rotate(-3)">
        <rect x="0" y="0" width="150" height="180" rx="4" fill="#121016" stroke="#2a2632"/>
        <rect x="0" y="0" width="150" height="132" rx="4" fill="#1a1720"/>
        <path d="M75 36c8 9.6 10.6 15 10.6 20a10.6 10.6 0 1 1-21.2 0c0-5 2.6-10.4 10.6-20z" fill="#2a2632"/>
        <text x="12" y="156" font-size="13" font-style="italic" fill="#f3ecde">Untitled no. 7</text>
        <text x="12" y="172" font-size="11" fill="#8a8378" font-family="Arial, sans-serif">$2 · 10% royalty</text>
      </g>
      <g transform="translate(176,52) rotate(2.5)">
        <rect x="0" y="0" width="150" height="180" rx="4" fill="#121016" stroke="#2a2632"/>
        <rect x="0" y="0" width="150" height="132" rx="4" fill="#1a1720"/>
        <path d="M75 36c8 9.6 10.6 15 10.6 20a10.6 10.6 0 1 1-21.2 0c0-5 2.6-10.4 10.6-20z" fill="#ff3b2f" opacity="0.85"/>
        <text x="12" y="156" font-size="13" font-style="italic" fill="#f3ecde">Study, in red</text>
        <text x="12" y="172" font-size="11" fill="#8a8378" font-family="Arial, sans-serif">resale · $5</text>
      </g>
    </g>

    <!-- four flows -->
    <line x1="56" y1="556" x2="1224" y2="556" stroke="#2a2632"/>
    <text x="56" y="592" font-size="17" font-style="italic" fill="#c3bbac">
      Primary sale<tspan fill="#5f594f"> / </tspan>Resale split<tspan fill="#5f594f"> / </tspan>Royalty home<tspan fill="#5f594f"> / </tspan>Direct tip<tspan fill="#ff3b2f"> — all native USDC, one transaction.</tspan>
    </text>
  </g>

  <rect x="1" y="1" width="1278" height="618" rx="6" fill="none" stroke="#2a2632"/>
</svg>
